name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

      # Typecheck is informational for now: src carries a pre-existing error
      # baseline (audit Phase 5 cleanup). Flip to blocking once it's clean.
      - name: Typecheck (non-blocking, known-dirty baseline)
        run: npm run typecheck
        continue-on-error: true

      # The schema-drift check (scripts/schema-drift-check.ts) needs a live
      # database — run it manually or wire a postgres service container later.
