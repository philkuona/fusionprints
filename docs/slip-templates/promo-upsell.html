<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600&family=Outfit:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1200px; height:1800px; }
  .card { width:1200px; height:1800px; background:#FBF7F0; color:#1F1B16;
    font-family:'Outfit',sans-serif; position:relative; overflow:hidden;
    display:flex; flex-direction:column; }
  .imgs { display:flex; height:760px; flex:0 0 auto; }
  .imgs figure { position:relative; flex:1 1 0; overflow:hidden; }
  .imgs img { width:100%; height:100%; object-fit:cover; display:block; }
  .imgs figure:first-child { border-right:6px solid #FBF7F0; }
  .content { flex:1 1 auto; padding:70px 90px 80px; display:flex; flex-direction:column; }
  .eyebrow { font-family:'DM Mono',monospace; font-size:30px; letter-spacing:.22em;
    text-transform:uppercase; color:#04A551; font-weight:500; }
  h1 { font-family:'Fraunces',serif; font-weight:600; font-size:122px; line-height:.98;
    letter-spacing:-2.5px; margin-top:24px; }
  h1 em { font-style:italic; color:#FF7A59; }
  .sub { font-size:38px; line-height:1.4; color:#4A3F32; margin-top:34px; max-width:980px; }
  .sizes { display:flex; gap:26px; margin-top:46px; }
  .size { flex:1 1 0; border:3px solid rgba(31,27,22,.12); border-radius:24px; padding:34px 36px; }
  .size .dim { font-family:'Fraunces',serif; font-weight:600; font-size:56px; letter-spacing:-1px; }
  .size .price { font-family:'DM Mono',monospace; font-size:40px; color:#04A551; margin-top:8px; font-weight:500; }
  .size .note { font-size:26px; color:#8A7B66; margin-top:6px; }
  .cta { margin-top:auto; display:flex; align-items:center; justify-content:center; gap:18px;
    background:#1F1B16; color:#FBF7F0; border-radius:999px; padding:38px; font-size:36px; font-weight:600; }
  .cta b { color:#05D668; font-weight:700; }
  .foot { margin-top:34px; text-align:center; font-family:'Fraunces',serif; font-style:italic;
    font-weight:500; font-size:38px; color:#1F1B16; }
</style></head>
<body><div class="card">
  <div class="imgs">
    <figure><img src="wallart-a.jpg" alt=""></figure>
    <figure><img src="wallart-b.jpg" alt=""></figure>
  </div>
  <div class="content">
    <div class="eyebrow">Wall art</div>
    <h1>Print it <em>bigger.</em></h1>
    <p class="sub">Some moments deserve more wall. Reprint your favourites as large wall art on professional stock.</p>
    <div class="sizes">
      <div class="size"><div class="dim">11&times;14</div><div class="price">$10</div><div class="note">Above a desk or in a hallway</div></div>
      <div class="size"><div class="dim">16&times;20</div><div class="price">$22</div><div class="note">A real centrepiece</div></div>
    </div>
    <div class="cta">Order on WhatsApp or <b>fusionprints.co.zw</b></div>
    <div class="foot">Hold the moment.</div>
  </div>
